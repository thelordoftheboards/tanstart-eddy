name: "${PROJECT_NAME}-full"

services:
  db:
    image: pgvector/pgvector:pg18
    env_file:
      - ../devconfig/full.env
    ports:
      - "${POSTGRES_EXPOSED_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 3s
  app:
    image: "${PROJECT_NAME}:latest"
    env_file:
      - ../.env
      - ../devconfig/full.env
    ports:
      - "8088:8088"
    restart: unless-stopped
    networks:
      - dev-network
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    name: "${PROJECT_NAME}-full-db-volume"

networks:
  dev-network:
    name: "${PROJECT_NAME}-full-network"
