metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "sqlite"

replication_mode = "none"
compression_level = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"
# Use `openssl rand -hex 32` to populate or GARAGE_RPC_SECRET
rpc_secret = ""

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = ".s3.garage.localhost"

[s3_web]
bind_addr = "[::]:3902"
root_domain = ".web.garage.localhost"
index = "index.html"

[k2v_api]
api_bind_addr = "[::]:3904"

[admin]
api_bind_addr = "[::]:3903"
# Use `openssl rand -base64 32` to populate or GARAGE_ADMIN_TOKEN
admin_token = ""
# Use `openssl rand -base64 32` to populate or GARAGE_METRICS_TOKEN
metrics_token = ""
